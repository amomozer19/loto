name: 🎯 Lint e Formatação

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint, Format e Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r config/requirements.txt
        pip install black isort flake8 pylint
    
    - name: Format with black
      run: black app tests --line-length=120
      continue-on-error: true
    
    - name: Sort imports with isort
      run: isort app tests
      continue-on-error: true
    
    - name: Lint with flake8
      run: |
        flake8 app tests \
          --count \
          --statistics \
          --max-line-length=120 \
          --max-complexity=10 \
          --exclude=.git,__pycache__,.venv,build,dist,.eggs
    
    - name: Lint with pylint
      run: pylint app --disable=all --enable=E,F --exit-zero || true
      continue-on-error: true
    
    - name: Commit changes if needed
      if: github.event_name == 'push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "style: format code with black and isort" || true
        git push || true
      continue-on-error: true

  docstring-check:
    name: Verificar Docstrings
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install pydocstyle
      run: |
        python -m pip install --upgrade pip
        pip install pydocstyle
    
    - name: Check docstrings
      run: |
        pydocstyle app --match='(?!__pycache__).*\.py' --ignore=D100,D104,D105 || true
      continue-on-error: true
