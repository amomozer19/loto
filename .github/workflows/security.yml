name: 🔒 Segurança e Análise

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Executar diariamente às 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security:
    name: Verificação de Segurança
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r config/requirements.txt
        pip install bandit safety semgrep
    
    - name: Bandit - Análise de vulnerabilidades
      run: |
        bandit -r app -f json -o bandit-report.json
        bandit -r app -f txt
      continue-on-error: true
    
    - name: Safety - Check dependencies
      run: |
        safety check --json > safety-report.json || true
        safety check
      continue-on-error: true
    
    - name: Semgrep - Static analysis
      uses: returntocorp/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/python
          p/flask
          p/owasp-top-ten
      continue-on-error: true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  dependency-check:
    name: Verificação de Dependências
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Check for outdated dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r config/requirements.txt
        pip list --outdated || true
    
    - name: Generate dependency tree
      run: |
        pip install pipdeptree
        pipdeptree > dependency-tree.txt
    
    - name: Upload dependency report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: dependency-reports
        path: dependency-tree.txt

  secrets-scan:
    name: Varredura de Segredos
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: TruffleHog - Detect secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug
      continue-on-error: true
    
    - name: GitGuardian - Secret detection
      uses: GitGuardian/ggshield-action@master
      env:
        GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
        GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
        GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      continue-on-error: true
