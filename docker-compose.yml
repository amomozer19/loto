version: '3.8'

services:
  # PostgreSQL Database para Keycloak
  postgres:
    image: postgres:15-alpine
    container_name: loto-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - loto-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak - Servidor de Identidade e Acesso
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: loto-keycloak
    environment:
      # Banco de dados
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password_change_me
      
      # Admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password_change_me
      
      # HTTPS/HTTP
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_PROXY: edge
      
      # Logs
      KC_LOG_LEVEL: info
      KC_LOG: "console"
    
    ports:
      - "8080:8080"
    
    networks:
      - loto-network
    
    depends_on:
      postgres:
        condition: service_healthy
    
    command: start-dev

  # Redis (opcional - para sessões distribuídas em futuro)
  redis:
    image: redis:7-alpine
    container_name: loto-redis
    ports:
      - "6379:6379"
    networks:
      - loto-network
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  loto-network:
    driver: bridge
