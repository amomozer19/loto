[pytest]
# Configuração do pytest

# Diretório de testes
testpaths = tests

# Padrão de nome para arquivos de teste
python_files = test_*.py

# Padrão de nome para funções de teste
python_functions = test_*

# Padrão de nome para classes de teste
python_classes = Test*

# Adicionar opções de linha de comando padrão
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=html
    --cov-report=term-missing

# Marcadores customizados
markers =
    unit: Testes unitários
    integration: Testes de integração
    slow: Testes lentos
    e2e: Testes end-to-end

# Configurar output
console_output_style = progress

# Variáveis de ambiente para testes
[pytest:env]
FLASK_ENV = testing
