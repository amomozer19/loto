sonar.projectKey=loto-project
sonar.projectName=LOTO - Análise de Sorteios
sonar.projectVersion=1.0

# Paths
sonar.sources=app
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python
sonar.python.version=3.10
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.pylint_config=.pylintrc

# Exclusion patterns
sonar.exclusions=**/__init__.py,**/__pycache__/**,**/tests/**

# Test exclusions
sonar.test.exclusions=**/__init__.py

# Code coverage
sonar.coverage.exclusions=**/__init__.py,**/tests/**,**/__pycache__/**

# Issue tracking
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1481
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py

# Quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
